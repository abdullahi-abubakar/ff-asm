[pytest]
testpaths = tests
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %H:%M:%S
markers =
    auth: Authentication and authorization tests
    contract: OpenAPI schema and response contract tests
    tenant: Multi-tenant data isolation tests
    crud: Create-Read-Update-Delete lifecycle tests
    negative: Negative paths, invalid input, edge cases
    load: Load and performance tests (run separately via locust)
